name: 04 Monthly – Generate Raw Summary Table

on:
  schedule:
    - cron: '30 7 1 * *'     # 1. i måneden kl 08:30 dansk tid
  workflow_dispatch:

jobs:
  raw-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate raw monthly summary
        run: python scripts/generate_raw_monthly_summary.py

      - name: Commit raw summary
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Monthly raw summary table generated"
          file_pattern: data/monthly/raw/**