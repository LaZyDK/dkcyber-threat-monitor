name: 01 Collect Raw Threats

on:
  schedule:
    - cron: '0 */12 * * *'   # every 3 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  collect-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect and classify threats
        id: collect
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_API_URL: ${{ vars.LLM_API_URL }}
          LLM_MODEL_CHEAP: ${{ vars.LLM_MODEL_CHEAP }}
        run: |
          python scripts/collect_threats.py

      - name: Summarise this run
        id: summary
        run: |
          RAW_FILE="${{ steps.collect.outputs.raw_file }}"
          if [ -n "$RAW_FILE" ] && [ -f "$RAW_FILE" ]; then
            TOTAL=$(jq 'length' "$RAW_FILE")
            ATTACKS=$(jq '[.[] | select(.is_dk_relevant == true)] | length' "$RAW_FILE")
            FILTERED=$((TOTAL - ATTACKS))
            echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
            echo "attacks=$ATTACKS" >> "$GITHUB_OUTPUT"
            echo "filtered=$FILTERED" >> "$GITHUB_OUTPUT"
            echo "raw_file=$(basename "$RAW_FILE")" >> "$GITHUB_OUTPUT"

            {
              echo "details<<DETAILSEOF"
              jq -r '.[] | "| [\(.title)](\(.link)) | \(if .is_dk_relevant then "**JA**" else "Nej" end) | \(.attack_type // "?") | \(.sector // "?") | \(.confidence) | \(.explanation) |"' "$RAW_FILE"
              echo "DETAILSEOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "total=0" >> "$GITHUB_OUTPUT"
            echo "attacks=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update verification PR
        if: steps.summary.outputs.total != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: ${{ steps.summary.outputs.raw_file }} — ${{ steps.summary.outputs.attacks }} DK attacks / ${{ steps.summary.outputs.total }} total"
          title: "Verify: nye trusler til review"
          body: |
            ## Seneste indsamling: `${{ steps.summary.outputs.raw_file }}`

            | Collected | Verified DK attacks | Filtered |
            |-----------|-------------------|----------|
            | ${{ steps.summary.outputs.total }} | ${{ steps.summary.outputs.attacks }} | ${{ steps.summary.outputs.filtered }} |

            ### Detaljer

            | Titel | Dansk angreb? | Type | Sektor | Confidence | Forklaring |
            |-------|--------------|------|--------|------------|------------|
            ${{ steps.summary.outputs.details }}

            ---
            **Tip:** Hver commit = én indsamlingskørsel. Review commits individuelt.

            Kun entries med `is_dk_relevant: true` tilføjes til verified_threats.json ved merge.
          branch: threat-verification
          delete-branch: true
          labels: verification,threat
          assignees: LaZyDK
