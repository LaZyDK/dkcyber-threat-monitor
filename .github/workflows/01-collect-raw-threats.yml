name: 01 Collect Raw Threats

on:
  schedule:
    - cron: '0 7 * * *'   # 0 */6 * * * every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  collect-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect and classify threats
        id: collect
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_API_URL: ${{ vars.LLM_API_URL }}
          LLM_MODEL_CHEAP: ${{ vars.LLM_MODEL_CHEAP }}
        run: |
          python scripts/collect_web.py

      - name: Summarise classified entries
        id: summary
        run: |
          RAW_FILE=$(ls -t data/raw/*.json 2>/dev/null | head -n1)
          if [ -n "$RAW_FILE" ]; then
            TOTAL=$(jq 'length' "$RAW_FILE")
            ATTACKS=$(jq '[.[] | select(.is_dk_attack == true)] | length' "$RAW_FILE")
            FILTERED=$((TOTAL - ATTACKS))
            echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
            echo "attacks=$ATTACKS" >> "$GITHUB_OUTPUT"
            echo "filtered=$FILTERED" >> "$GITHUB_OUTPUT"

            # Build a markdown list of classified entries for the PR body
            {
              echo "details<<DETAILSEOF"
              jq -r '.[] | "| [\(.title[:60])](\(.link)) | \(if .is_dk_attack then "**DA**" else "Nej" end) | \(.confidence) | \(.explanation[:80]) |"' "$RAW_FILE"
              echo "DETAILSEOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update verification PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: collected new raw threat data"
          title: "Verify: ${{ steps.summary.outputs.attacks }} danske angreb fundet"
          body: |
            ## LLM-klassificerede trusler

            | Total | Verified DK attacks | Filtered |
            |-------|-------------------|----------|
            | ${{ steps.summary.outputs.total }} | ${{ steps.summary.outputs.attacks }} | ${{ steps.summary.outputs.filtered }} |

            ### Detaljer

            | Titel | Dansk angreb? | Confidence | Forklaring |
            |-------|--------------|------------|------------|
            ${{ steps.summary.outputs.details }}

            ---
            Kun entries med `is_dk_attack: true` tilføjes til verified_threats.json ved merge.
            Du kan override ved at redigere JSON og sætte `is_dk_attack: true` på en entry.

            Review → rediger om nødvendigt → merge når verificeret.
          branch: threat-verification-${{ github.run_id }}
          delete-branch: true
          labels: verification,threat
