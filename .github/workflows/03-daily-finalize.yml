name: 03 Daily – Finalize Post

on:
  push:
    paths:
      - 'data/drafts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  finalize-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Read latest draft
        id: draft
        run: |
          DRAFT_FILE=$(ls -1t data/drafts/*.json 2>/dev/null | head -n 1)
          if [ -z "$DRAFT_FILE" ]; then
            echo "No draft files found"
            exit 1
          fi
          cp "$DRAFT_FILE" /tmp/draft.json

      - name: Finalize daily post via OpenRouter API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL_TOOLUSE: ${{ vars.LLM_MODEL_TOOLUSE }}
        run: |
          DRAFT_CONTENT=$(cat /tmp/draft.json)

          SYSTEM_PROMPT="Du er en dansk cybersecurity-entusiast der poster i r/dkcybersecurity.
          Skriv engagerende, naturlig tekst på dansk.
          Emojis sparsomt, stil gerne spørgsmål til læserne.

          VIGTIGT – tilføj ALTID denne disclaimer nederst i body:

          ---
          *Denne post er genereret af LLM med human oversight via mit open-source GitHub-projekt: https://github.com/LaZyDK/dkcyber-threat-monitor*
          Rå data er verificeret af mig før posting.

          Svar KUN med denne JSON (ingen anden tekst):
          {\"title\": \"...\", \"body\": \"...\"}"

          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg model "$LLM_MODEL_TOOLUSE" \
              --arg system "$SYSTEM_PROMPT" \
              --arg draft "$DRAFT_CONTENT" \
              '{
                model: $model,
                messages: [
                  {role: "system", content: $system},
                  {role: "user", content: ("Indhold fra dagligt udkast:\n" + $draft)}
                ],
                temperature: 0.75,
                max_tokens: 1400
              }')")

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [ -z "$CONTENT" ]; then
            echo "LLM returned empty response"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          CONTENT=$(echo "$CONTENT" | sed 's/^```json//;s/^```//;s/```$//' | tr -d '\n' | sed 's/^[[:space:]]*//')

          TITLE=$(echo "$CONTENT" | jq -r '.title // empty')
          BODY=$(echo "$CONTENT" | jq -r '.body // empty')

          if [ -z "$TITLE" ] || [ -z "$BODY" ]; then
            echo "Failed to parse LLM output:"
            echo "$CONTENT"
            exit 1
          fi

          mkdir -p data/generated
          printf '%s' "$TITLE" > "data/generated/title_${GITHUB_SHA}.txt"
          printf '%s' "$BODY" > "data/generated/post_${GITHUB_SHA}.md"

          echo "Finalized: $TITLE"

      - name: Commit final post
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily final Reddit-post klar til review"
          file_pattern: data/generated/**
          branch: ${{ github.head_ref || 'main' }}
