name: 03 Daily – Finalize Post

on:
  push:
    branches: [main]
    paths:
      - 'data/drafts/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  finalize-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Read latest draft and raw data
        run: |
          DRAFT=$(ls -1t data/drafts/*.json 2>/dev/null | head -n 1 | xargs cat 2>/dev/null || echo "{}")
          RAW=$(ls -1t data/raw/*.json 2>/dev/null | head -n 1 | xargs cat 2>/dev/null || echo "[]")
          echo "$DRAFT" > /tmp/draft.json
          echo "$RAW" > /tmp/raw.json

      - name: Finalize daily post via OpenRouter API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL_TOOLUSE: ${{ vars.LLM_MODEL_TOOLUSE }}
        run: |
          DRAFT_CONTENT=$(cat /tmp/draft.json)
          RAW_CONTENT=$(cat /tmp/raw.json)

          SYSTEM_PROMPT="Du er en dansk cybersecurity-entusiast der poster i r/dkcybersecurity.
          Skriv engagerende, naturlig tekst på dansk. Emojis sparsomt.

          VIGTIGT – for HVER hændelse SKAL du inkludere disse datapunkter:
          1. Dato (fra timestamp/published)
          2. Navn/titel på hændelsen
          3. Angrebstype (ransomware, DDoS, phishing, databrud, supply-chain, etc.)
          4. Berørt sektor (sundhed, finans, offentlig, energi, it, etc.)
          5. Kort beskrivelse af hændelsen
          6. Link til kildeartiklen i markdown-format: [kilde](url)

          VIGTIGT – tilføj en '## Diskussion' sektion EFTER hændelserne med 2-3 spørgsmål:
          - Er jeres organisation eller sektor berørt af lignende angreb?
          - Har I set tegn på lignende aktivitet?
          - Hvilke forholdsregler tager I mod denne type angreb?
          (Tilpas spørgsmålene til de specifikke hændelser i posten)

          VIGTIGT – tilføj ALTID denne disclaimer NEDERST i body:

          ---
          *Denne post er genereret af LLM med human oversight via mit open-source GitHub-projekt: https://github.com/LaZyDK/dkcyber-threat-monitor*
          Rå data er verificeret af mig før posting.

          Svar KUN med denne JSON (ingen anden tekst):
          {\"title\": \"...\", \"body\": \"...\"}"

          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg model "$LLM_MODEL_TOOLUSE" \
              --arg system "$SYSTEM_PROMPT" \
              --arg draft "$DRAFT_CONTENT" \
              --arg raw "$RAW_CONTENT" \
              '{
                model: $model,
                messages: [
                  {role: "system", content: $system},
                  {role: "user", content: ("Dagligt udkast:\n" + $draft + "\n\nRå data med links og datoer:\n" + $raw)}
                ],
                temperature: 0.75,
                max_tokens: 1400
              }')")

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [ -z "$CONTENT" ]; then
            echo "LLM returned empty response"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          CONTENT=$(echo "$CONTENT" | sed 's/^```json//;s/^```//;s/```$//' | tr -d '\n' | sed 's/^[[:space:]]*//')

          TITLE=$(echo "$CONTENT" | jq -r '.title // empty')
          BODY=$(echo "$CONTENT" | jq -r '.body // empty')

          if [ -z "$TITLE" ] || [ -z "$BODY" ]; then
            echo "Failed to parse LLM output:"
            echo "$CONTENT"
            exit 1
          fi

          mkdir -p data/generated
          jq -n --arg title "$TITLE" --arg body "$BODY" \
            '{title: $title, body: $body}' > "data/generated/post_${GITHUB_SHA}.json"

          echo "Finalized: $TITLE"

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Commit final post
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily final Reddit-post klar til review"
          file_pattern: data/generated/**
          branch: ${{ github.head_ref || 'main' }}
