name: 03 Agent 2 – Final Human-like Post

on:
  push:
    paths:
      - 'data/drafts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  agent2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Read latest draft
        id: draft
        run: |
          CONTENT=$(ls -1t data/drafts/*.json 2>/dev/null | head -n 1 | xargs cat 2>/dev/null || echo "No drafts found")
          {
            echo "content<<DRAFTEOF"
            echo "$CONTENT"
            echo "DRAFTEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Agent 2 – Refine to natural Reddit post
        id: agent2
        uses: appleboy/llm-action@v1
        with:
          api_key: ${{ secrets.OPENROUTER_API_KEY }}
          base_url: https://openrouter.ai/api/v1
          model: meta-llama/llama-3.3-70b-instruct:free
          system_prompt: |
            Du er en dansk cybersecurity-entusiast der poster i r/dkcybersecurity.
            Skriv engagerende, naturlig tekst på dansk.
            Emojis sparsomt, stil gerne spørgsmål til læserne.

            VIGTIGT – tilføj ALTID denne disclaimer nederst i body:

            ---
            🤖 *Denne post er genereret af LLM (Llama 3.1 70B) med human oversight via et open-source GitHub-projekt: https://github.com/LaZyDK/dkcyber-threat-monitor*
            Rå data er verificeret af mig før posting.
          input_prompt: |
            Indhold fra Agent 1:
            ${{ steps.draft.outputs.content }}
          tool_schema: |
            {"name": "final_post", "parameters": {"type": "object", "properties": {"title": {"type": "string"}, "body": {"type": "string"}}, "required": ["title", "body"]}}
          temperature: 0.75
          max_tokens: 1400

      - name: Save final post files
        env:
          POST_TITLE: ${{ steps.agent2.outputs.title }}
          POST_BODY: ${{ steps.agent2.outputs.body }}
        run: |
          mkdir -p data/generated
          printf '%s' "$POST_TITLE" > data/generated/title_${{ github.sha }}.txt
          printf '%s' "$POST_BODY"  > data/generated/post_${{ github.sha }}.md

      - name: Commit final post
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Agent 2 final Reddit-post klar til review"
          file_pattern: data/generated/**
          branch: ${{ github.head_ref || 'main' }}
