name: 03 Post Approved to Reddit

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: write

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  handle-closed-issue:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'reddit-post-pending')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Handle closed issue
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          python scripts/post_to_reddit.py handle-closed
          ${{ github.event.issue.number }}
          ${{ github.event.issue.state_reason }}

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Commit updated verified_threats.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/verified_threats.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update verified_threats after issue #${{ github.event.issue.number }}"
            git push origin main
          fi
