name: 05 Monthly Agent 1 – Quick Draft

on:
  push:
    paths:
      - 'data/monthly/raw/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  agent1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Read latest raw monthly summary
        id: read_raw
        run: |
          RAW_FILE=$(ls -t data/monthly/raw/*.json 2>/dev/null | head -n1)
          {
            echo "raw_content<<RAWEOF"
            cat "$RAW_FILE" | jq -c .
            echo "RAWEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Agent 1 – Quick monthly draft (OpenRouter free)
        id: agent1
        uses: appleboy/llm-action@v1
        with:
          api_key: ${{ secrets.OPENROUTER_API_KEY }}
          base_url: https://openrouter.ai/api/v1
          model: openai/gpt-3.5-turbo
          system_prompt: |
            Du er en simpel dansk cybersecurity-assistent.
            Lav kun en titel + kort intro til månedlig opsummering.
          input_prompt: |
            Rå månedlig opsummering: ${{ steps.read_raw.outputs.raw_content }}
          tool_schema: |
            {"name": "draft", "parameters": {"type": "object", "properties": {"title": {"type": "string"}, "draft_body": {"type": "string"}}, "required": ["title", "draft_body"]}}
          temperature: 0.6
          max_tokens: 800

      - name: Save draft to file
        env:
          DRAFT_TITLE: ${{ steps.agent1.outputs.title }}
          DRAFT_BODY: ${{ steps.agent1.outputs.draft_body }}
        run: |
          mkdir -p data/monthly/drafts
          printf '%s' "$DRAFT_TITLE" > data/monthly/drafts/agent1_$(date +%Y-%m)_title.txt
          printf '%s' "$DRAFT_BODY" > data/monthly/drafts/agent1_$(date +%Y-%m)_body.txt

      - name: Commit draft
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Monthly Agent 1 quick draft created"
          file_pattern: data/monthly/drafts/**
          branch: ${{ github.head_ref || 'main' }}