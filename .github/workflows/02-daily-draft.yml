name: 02 Daily – Create Draft

on:
  push:
    paths:
      - 'data/raw/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Read latest raw threat file
        id: read_raw
        run: |
          RAW_FILE=$(ls -t data/raw/*.json 2>/dev/null | head -n1)
          if [ -z "$RAW_FILE" ]; then
            echo "No raw files found"
            exit 1
          fi
          # Compact JSON for prompt
          jq -c . "$RAW_FILE" > /tmp/raw_compact.json

      - name: Create draft via OpenRouter API
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL_CHEAP: ${{ vars.LLM_MODEL_CHEAP }}
        run: |
          RAW_CONTENT=$(cat /tmp/raw_compact.json)

          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg model "$LLM_MODEL_CHEAP" \
              --arg raw "$RAW_CONTENT" \
              '{
                model: $model,
                messages: [{
                  role: "user",
                  content: ("Du er en simpel dansk cybersecurity-assistent.\nLav en titel og kort udkast (max 300 tegn) baseret på disse data.\n\nSvar KUN med denne JSON (ingen anden tekst):\n{\"title\": \"...\", \"draft_body\": \"...\"}\n\nRå data: " + $raw)
                }],
                temperature: 0.6,
                max_tokens: 600
              }')")

          # Extract content from response
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [ -z "$CONTENT" ]; then
            echo "LLM returned empty response"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          # Strip markdown code blocks if present
          CONTENT=$(echo "$CONTENT" | sed 's/^```json//;s/^```//;s/```$//' | tr -d '\n' | sed 's/^[[:space:]]*//')

          TITLE=$(echo "$CONTENT" | jq -r '.title // empty')
          BODY=$(echo "$CONTENT" | jq -r '.draft_body // empty')

          if [ -z "$TITLE" ] || [ -z "$BODY" ]; then
            echo "Failed to parse LLM output:"
            echo "$CONTENT"
            exit 1
          fi

          mkdir -p data/drafts
          echo "$CONTENT" > "data/drafts/daily_${GITHUB_SHA}.json"

          echo "Draft created: $TITLE"

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Commit draft
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily draft created"
          file_pattern: data/drafts/**
          branch: ${{ github.head_ref || 'main' }}
