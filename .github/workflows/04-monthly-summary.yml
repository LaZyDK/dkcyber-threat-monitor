name: 04 Monthly Summary + Review Issue

on:
  schedule:
    - cron: '30 7 1 * *'     # 1. i måneden kl 08:30 dansk tid
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  monthly-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate monthly summary
        run: python scripts/generate_monthly_summary.py

      - name: Generate monthly post and create review issue
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_API_URL: ${{ vars.LLM_API_URL }}
          LLM_MODEL_TOOLUSE: ${{ vars.LLM_MODEL_TOOLUSE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/post_to_reddit.py generate-monthly

      - name: Clean up raw summary files
        run: rm -f data/monthly/summary_*.json

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/monthly/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: monthly summary issue created, cleanup raw files"
            git pull --rebase origin main
            git push origin main
          fi
