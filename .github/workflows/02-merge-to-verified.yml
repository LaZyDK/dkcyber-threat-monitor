name: 02 Merge to Verified

on:
  pull_request:
    types: [closed]
    paths:
      - 'data/raw/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  append-verified:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.merged == true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Append verified threats
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_API_URL: ${{ vars.LLM_API_URL }}
          LLM_MODEL_CHEAP: ${{ vars.LLM_MODEL_CHEAP }}
        run: python scripts/append_verified.py

      - name: Clean up processed files
        run: |
          rm -f data/raw/*.json
          rm -f data/drafts/*.json data/drafts/*.txt
          rm -f data/generated/*.txt data/generated/*.md

      - name: Commit verified threats and cleanup
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: append verified threats + clean up processed files"
          file_pattern: "data/verified_threats.json data/raw/ data/drafts/ data/generated/"
          branch: main
