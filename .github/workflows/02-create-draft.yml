name: 02 Create Draft

on:
  push:
    branches: [main]
    paths:
      - 'data/raw/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: push-to-main
  cancel-in-progress: false

jobs:
  create-draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Read latest raw threat file (DK attacks only)
        id: read_raw
        run: |
          RAW_FILE=$(ls -t data/raw/*.json 2>/dev/null | head -n1)
          if [ -z "$RAW_FILE" ]; then
            echo "No raw files found — nothing to draft"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Filter to only verified DK attacks
          jq -c '[.[] | select(.is_dk_attack == true)]' "$RAW_FILE" > /tmp/raw_compact.json
          COUNT=$(jq 'length' /tmp/raw_compact.json)
          echo "Found $COUNT DK attacks in $(basename "$RAW_FILE")"
          if [ "$COUNT" -eq 0 ]; then
            echo "No DK attacks to draft — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft via OpenRouter API
        if: steps.read_raw.outputs.skip != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_MODEL_CHEAP: ${{ vars.LLM_MODEL_CHEAP }}
        run: |
          RAW_CONTENT=$(cat /tmp/raw_compact.json)

          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg model "$LLM_MODEL_CHEAP" \
              --arg raw "$RAW_CONTENT" \
              '{
                model: $model,
                messages: [{
                  role: "user",
                  content: ("Du er en simpel dansk cybersecurity-assistent.\nLav en titel og kort udkast (max 300 tegn) baseret på disse data.\n\nSvar KUN med denne JSON (ingen anden tekst):\n{\"title\": \"...\", \"draft_body\": \"...\"}\n\nRå data: " + $raw)
                }],
                temperature: 0.6,
                max_tokens: 600
              }')")

          # Extract content from response
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          if [ -z "$CONTENT" ]; then
            echo "LLM returned empty response"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          # Strip markdown code blocks if present
          CONTENT=$(echo "$CONTENT" | sed 's/^```json//;s/^```//;s/```$//' | tr -d '\n' | sed 's/^[[:space:]]*//')

          TITLE=$(echo "$CONTENT" | jq -r '.title // empty')
          BODY=$(echo "$CONTENT" | jq -r '.draft_body // empty')

          if [ -z "$TITLE" ] || [ -z "$BODY" ]; then
            echo "Failed to parse LLM output:"
            echo "$CONTENT"
            exit 1
          fi

          mkdir -p data/drafts
          echo "$CONTENT" > "data/drafts/daily_${GITHUB_SHA}.json"

          echo "Draft created: $TITLE"

          # Replace original file with compact version for later use in finalization step
          mv /tmp/raw_compact.json "$RAW_FILE"

      - name: Commit and push draft
        if: steps.read_raw.outputs.skip != 'true'
        run: |
          git add data/drafts/ data/raw/
          if git diff --cached --quiet; then
            echo "No draft changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Daily draft created"
            git pull --rebase origin main
            git push origin main
          fi
