name: 30 Active Threat Search

on:
  schedule:
    - cron: '0 10 * * *'   # daily at 10:00 UTC (11:00 Danish time)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover threats via Brave Search + LLM
        id: discover
        env:
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LLM_API_URL: ${{ vars.LLM_API_URL }}
          LLM_MODEL_CHEAP: ${{ vars.LLM_MODEL_CHEAP }}
          BRAVE_SEARCH_URL: ${{ vars.BRAVE_SEARCH_URL }}
        run: python scripts/discover_threats.py

      - name: Summarise this run
        id: summary
        run: |
          RAW_FILE="${{ steps.discover.outputs.raw_file }}"
          if [ -n "$RAW_FILE" ] && [ -f "$RAW_FILE" ]; then
            TOTAL=$(jq 'length' "$RAW_FILE")
            ATTACKS=$(jq '[.[] | select(.is_dk_attack == true)] | length' "$RAW_FILE")
            echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
            echo "attacks=$ATTACKS" >> "$GITHUB_OUTPUT"
            echo "raw_file=$(basename "$RAW_FILE")" >> "$GITHUB_OUTPUT"

            {
              echo "details<<DETAILSEOF"
              jq -r '.[] | select(.is_dk_attack == true) | "| [\(.title)](\(.link)) | \(.attack_type // "?") | \(.sector // "?") | \(.confidence) | \(.explanation) |"' "$RAW_FILE"
              echo "DETAILSEOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "total=0" >> "$GITHUB_OUTPUT"
            echo "attacks=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with discovered threats
        if: steps.summary.outputs.attacks != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: ${{ steps.summary.outputs.raw_file }} — ${{ steps.summary.outputs.attacks }} DK attacks / ${{ steps.summary.outputs.total }} total"
          title: "Discovered: nye danske angreb (via Brave Search)"
          body: |
            ## Seneste opdagelse: `${{ steps.summary.outputs.raw_file }}`

            Fundet via Brave Search + LLM-klassificering (ikke fra RSS feeds).

            | Total søgeresultater | Verified DK attacks |
            |---------------------|-------------------|
            | ${{ steps.summary.outputs.total }} | ${{ steps.summary.outputs.attacks }} |

            ### Verificerede danske angreb

            | Titel | Type | Sektor | Confidence | Forklaring |
            |-------|------|--------|------------|------------|
            ${{ steps.summary.outputs.details }}

            ---
            **Tip:** Hver commit = én søgekørsel. Review commits individuelt.

            Review → rediger om nødvendigt → merge når verificeret.
          branch: discover-threats
          delete-branch: true
          labels: discovery,threat
          assignees: LaZyDK
