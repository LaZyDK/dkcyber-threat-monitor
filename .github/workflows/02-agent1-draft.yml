name: 02 Agent 1 – Quick Draft

on:
  push:
    paths:
      - 'data/raw/**'
  pull_request:
    paths:
      - 'data/raw/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  agent1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Read latest raw threat file
        id: read_raw
        run: |
          RAW_FILE=$(ls -t data/raw/*.json 2>/dev/null | head -n1)
          {
            echo "raw_content<<RAWEOF"
            cat "$RAW_FILE" | jq -c .
            echo "RAWEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Agent 1 – Quick draft (OpenRouter free small model)
        id: agent1
        uses: appleboy/llm-action@v1
        with:
          api_key: ${{ secrets.OPENROUTER_API_KEY }}
          base_url: https://openrouter.ai/api/v1
          model: qwen/qwen3-vl-30b-a3b-thinking
          system_prompt: |
            Du er en simpel dansk cybersecurity-assistent.
            Lav kun en titel + kort udkast (max 300 tegn).
          input_prompt: |
            Rå data: ${{ steps.read_raw.outputs.raw_content }}
          tool_schema: |
            {"name": "draft", "parameters": {"type": "object", "properties": {"title": {"type": "string"}, "draft_body": {"type": "string"}}, "required": ["title", "draft_body"]}}
          temperature: 0.6
          max_tokens: 600

      - name: Save draft to file
        env:
          DRAFT_TITLE: ${{ steps.agent1.outputs.title }}
          DRAFT_BODY: ${{ steps.agent1.outputs.draft_body }}
          DRAFT_JSON: ${{ toJSON(steps.agent1.outputs) }}
        run: |
          mkdir -p data/drafts
          printf '%s' "$DRAFT_TITLE" > data/drafts/agent1_${{ github.sha }}_title.txt
          printf '%s' "$DRAFT_BODY" > data/drafts/agent1_${{ github.sha }}_body.txt
          printf '%s' "$DRAFT_JSON" > data/drafts/agent1_${{ github.sha }}.json

      - name: Commit draft
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Agent 1 quick draft created"
          file_pattern: data/drafts/**
          branch: ${{ github.head_ref || 'main' }}