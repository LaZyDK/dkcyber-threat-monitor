name: 10 Discover – Suggest New RSS Sources

on:
  push:
    paths:
      - 'data/raw/new_source_candidates.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe candidates for RSS feeds
        run: python scripts/discover_sources.py

      - name: Check for new feeds in feeds.json
        id: check
        run: |
          # Count feeds added by discovery
          DISC_COUNT=$(jq '[.[] | select(.added_by == "discovery")] | length' data/feeds.json)
          echo "count=$DISC_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$DISC_COUNT" -gt "0" ]; then
            {
              echo "feeds<<FEEDSEOF"
              jq -r '.[] | select(.added_by == "discovery") | "| \(.name) | \(.url) | \(.added) |"' data/feeds.json
              echo "FEEDSEOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with updated feeds.json
        if: steps.check.outputs.count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: add discovered RSS feed sources to feeds.json"
          title: "New sources: ${{ steps.check.outputs.count }} RSS feeds fundet"
          body: |
            ## Automatisk opdagede RSS-kilder

            Disse domæner dukkede op i Brave Search-resultater med
            artikler om danske cyberangreb, og har fungerende RSS feeds.

            De er tilføjet direkte til `data/feeds.json`.

            | Navn | Feed URL | Tilføjet |
            |------|----------|---------|
            ${{ steps.check.outputs.feeds }}

            ---
            Review og merge for at aktivere de nye kilder i indsamlingen.
          branch: new-sources-${{ github.run_id }}
          delete-branch: true
          labels: sources,discovery
