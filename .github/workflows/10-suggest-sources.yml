name: 10 Discover – Suggest New RSS Sources

on:
  push:
    paths:
      - 'data/raw/new_source_candidates.json'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Probe candidates for RSS feeds
        id: probe
        run: python scripts/discover_sources.py

      - name: Create PR with updated feeds.json
        if: steps.probe.outputs.new_count != '0' && steps.probe.outputs.new_count != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: add ${{ steps.probe.outputs.new_count }} discovered RSS feed sources to feeds.json"
          title: "New sources: ${{ steps.probe.outputs.new_count }} RSS feeds fundet"
          body: |
            ## Automatisk opdagede RSS-kilder

            Disse domæner dukkede op i Brave Search-resultater med
            artikler om danske cyberangreb, og har fungerende RSS feeds.

            De er tilføjet direkte til `data/feeds.json`.

            | Navn | Feed URL | Tilføjet |
            |------|----------|---------|
            ${{ steps.probe.outputs.new_feeds }}

            ---
            Review og merge for at aktivere de nye kilder i indsamlingen.
          branch: new-sources
          delete-branch: true
          labels: sources,discovery
          assignees: LaZyDK
