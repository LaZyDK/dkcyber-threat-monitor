name: 01 Collect Raw + Create PR

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  collect-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect raw threats
        run: python scripts/collect_web.py

      - name: Create or update verification PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: collected new raw threat data"
          title: "Verify new threats – manual review needed"
          body: |
            New raw data collected.
            Please review → edit if needed → merge when verified.
          branch: threat-verification-${{ github.run_id }}
          delete-branch: true
          labels: verification,threat
